<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 工具导航 - 收录 ChatGPT、DeepSeek、Claude、Midjourney、Suno 等最全 AI 工具，按分类浏览，支持搜索和收藏。">
<meta name="keywords" content="AI工具导航,AI工具箱,人工智能工具,ChatGPT,DeepSeek,AI绘画,AI写作,AI编程">
<meta property="og:title" content="AI 工具导航">
<meta property="og:description" content="最全 AI 工具导航，一站式发现好用的人工智能工具。">
<meta property="og:type" content="website">
<title>AI 工具导航</title>
<style>
:root {
  --bg: #0a0a1a;
  --bg2: #0f0f2a;
  --card: rgba(18, 18, 40, 0.7);
  --card-hover: rgba(30, 30, 60, 0.8);
  --card-border: rgba(255, 255, 255, 0.06);
  --card-glow: rgba(99, 102, 241, 0.3);
  --text: #e8e8f0;
  --text2: #9090aa;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-glow: rgba(99, 102, 241, 0.4);
  --border: rgba(255, 255, 255, 0.08);
  --danger: #f87171;
  --success: #34d399;
  --star: #fbbf24;
  --radius: 14px;
  --blur: 20px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme=light] {
  --bg: #f0f2f8;
  --bg2: #e8eaf2;
  --card: rgba(255, 255, 255, 0.75);
  --card-hover: rgba(255, 255, 255, 0.9);
  --card-border: rgba(0, 0, 0, 0.06);
  --card-glow: rgba(99, 102, 241, 0.15);
  --text: #1a1a2e;
  --text2: #6b7280;
  --border: rgba(0, 0, 0, 0.06);
  --accent-glow: rgba(99, 102, 241, 0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ======== Animated Aurora Background ======== */
.aurora {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.aurora .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  animation: float 20s ease-in-out infinite;
}
.aurora .orb:nth-child(1) {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #6366f1 0%, transparent 70%);
  top: -200px; left: -100px;
  animation-delay: 0s;
}
.aurora .orb:nth-child(2) {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #a855f7 0%, transparent 70%);
  top: 40%; right: -150px;
  animation-delay: -7s;
}
.aurora .orb:nth-child(3) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
  bottom: -150px; left: 30%;
  animation-delay: -14s;
}
@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(80px, -60px) scale(1.1); }
  50% { transform: translate(-40px, 80px) scale(0.9); }
  75% { transform: translate(-60px, -40px) scale(1.05); }
}
[data-theme=light] .aurora .orb { opacity: 0.35; }

/* ======== Floating Particles ======== */
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--accent2);
  opacity: 0;
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ======== Custom Scrollbar ======== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

/* ======== Header ======== */
.header {
  background: var(--card);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition), border var(--transition);
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.search-box { flex: 1; max-width: 400px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px 10px 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: all var(--transition);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: rgba(255, 255, 255, 0.06);
}
.search-box input::placeholder { color: var(--text2); }
.search-box .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; }

.icon-btn {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  padding: 8px 14px;
  border-radius: 10px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}
.icon-btn:hover { color: var(--accent2); border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
.icon-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.3);
  transform: scale(0);
  animation: ripple 0.6s ease-out;
  pointer-events: none;
}
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

/* ======== Container ======== */
.container { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

/* ======== Navigation ======== */
.nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; overflow-x: auto; padding-bottom: 2px; }
.nav-item {
  padding: 8px 18px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  font-weight: 500;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.nav-item:hover {
  border-color: var(--accent);
  color: var(--text);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--accent-glow);
}
.nav-item.active {
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.nav-item.edu-btn {
  background: rgba(139, 92, 246, 0.12);
  color: #a78bfa;
  border-color: rgba(139, 92, 246, 0.25);
  font-weight: 600;
}
.nav-item.edu-btn.active {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}

/* Sub-nav */
.sub-nav { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; overflow-x: auto; }
.sub-nav-item {
  padding: 6px 14px; border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--text2);
  cursor: pointer; font-size: 12px;
  white-space: nowrap;
  transition: all 0.2s ease;
}
.sub-nav-item:hover { border-color: var(--accent2); color: var(--text); }
.sub-nav-item.active {
  background: rgba(139, 92, 246, 0.2);
  color: #a78bfa;
  border-color: rgba(139, 92, 246, 0.4);
}

/* ======== Stats & Banner ======== */
.stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.stat {
  padding: 8px 16px;
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  transition: all var(--transition);
}
.stat strong { color: var(--text); font-weight: 600; }

/* ======== Ad Banner ======== */
.ad-banner {
  margin-bottom: 14px; padding: 14px 20px;
  border-radius: var(--radius);
  border: 1px dashed rgba(99, 102, 241, 0.2);
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  display: none;
  position: relative;
  animation: adPulse 2s ease-in-out infinite;
}
@keyframes adPulse {
  0%, 100% { border-color: rgba(99, 102, 241, 0.15); }
  50% { border-color: rgba(99, 102, 241, 0.4); }
}
.ad-banner:hover { border-color: var(--accent); border-style: solid; box-shadow: 0 4px 20px var(--accent-glow); }
.ad-banner.active { display: block; }
.ad-banner .ad-label { position: absolute; top: 4px; right: 10px; font-size: 10px; color: var(--text2); opacity: 0.5; }
.ad-banner.dormant { border-style: dashed; opacity: 0.4; }
.ad-banner.dormant:hover { opacity: 0.8; }

/* ======== Card Grid ======== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.card {
  background: var(--card);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  will-change: transform;
  opacity: 0;
  animation: cardEnter 0.5s ease forwards;
}
.card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, transparent 30%, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: -1;
  pointer-events: none;
}
.card:hover::before { opacity: 1; }
.card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(99, 102, 241, 0.2);
}
.card-body { padding: 16px; position: relative; z-index: 1; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-name {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-name .icon { font-size: 22px; transition: transform 0.2s ease; }
.card:hover .card-name .icon { transform: scale(1.15) rotate(-5deg); }
.card-rating { color: var(--star); font-size: 12px; font-weight: 600; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tag {
  font-size: 11px; padding: 3px 9px;
  border-radius: 6px;
  background: rgba(99, 102, 241, 0.1);
  color: var(--accent2);
  font-weight: 500;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.tag.free { background: rgba(52, 211, 153, 0.12); color: var(--success); }
.tag.paid { background: rgba(248, 113, 113, 0.12); color: var(--danger); }
.tag.freemium { background: rgba(251, 191, 36, 0.12); color: var(--star); }
.tag.vpn { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.25); }
.card-desc {
  font-size: 13px; color: var(--text2);
  line-height: 1.55; margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text2);
}
.fav-btn {
  background: none; border: none; font-size: 18px;
  cursor: pointer; padding: 6px;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.fav-btn:hover { background: rgba(239, 68, 68, 0.1); transform: scale(1.2); }
.fav-btn.active { color: #ef4444; animation: heartBeat 0.4s ease; }
@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  25% { transform: scale(1.3); }
  50% { transform: scale(0.95); }
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ======== Sidebar ======== */
.sidebar {
  position: fixed; top: 0; right: -380px;
  width: 360px; height: 100%;
  background: var(--card);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0; overflow-y: auto;
  box-shadow: -8px 0 40px rgba(0, 0, 0, 0.3);
}
.sidebar.active { right: 0; }
.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: rgba(18, 18, 40, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 2;
}
[data-theme=light] .sidebar-header { background: rgba(255, 255, 255, 0.9); }
.sidebar-list { padding: 12px; }
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 150;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.overlay.active { opacity: 1; pointer-events: auto; }
.fav-item {
  padding: 12px 14px; margin-bottom: 8px;
  border-radius: 12px; cursor: pointer;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.02);
  transition: all 0.2s ease;
}
.fav-item:hover { background: var(--card-hover); border-color: var(--accent); transform: translateX(-4px); }
.fav-item h4 { font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.fav-item p { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ======== Modal ======== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--card);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%; max-width: 460px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
  animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text2); padding: 6px 10px; border-radius: 8px; transition: all 0.2s; }
.modal-close:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }
.feedback-body { padding: 16px 22px; }
.feedback-type { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.fb-type-btn {
  padding: 7px 15px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer; font-size: 13px;
  color: var(--text2);
  transition: all 0.2s ease;
}
.fb-type-btn:hover { border-color: var(--accent); color: var(--text); }
.fb-type-btn.active { background: rgba(99, 102, 241, 0.15); color: var(--accent2); border-color: rgba(99, 102, 241, 0.4); }
.fb-input {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.03);
  color: var(--text); font-size: 14px;
  resize: vertical; min-height: 100px;
  font-family: inherit; line-height: 1.5;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.fb-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.fb-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.fb-count { font-size: 12px; color: var(--text2); }
.fb-submit {
  padding: 9px 22px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff; border: none;
  border-radius: 24px;
  font-size: 14px; cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.fb-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
.fb-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.feedback-success { text-align: center; padding: 40px 20px; }
.feedback-success .success-icon { font-size: 48px; margin-bottom: 12px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

/* ======== Back to Top ======== */
.back-top {
  position: fixed;
  bottom: 32px; right: 32px;
  width: 46px; height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  z-index: 90;
  box-shadow: 0 8px 24px var(--accent-glow);
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.back-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.back-top:hover { transform: translateY(-3px); box-shadow: 0 12px 32px var(--accent-glow); }

/* ======== Empty State ======== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .big { font-size: 56px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }

/* ======== Responsive ======== */
@media(max-width:768px) {
  .header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 16px; }
  .search-box { max-width: 100%; order: 3; flex: 1 1 100%; }
  .search-box input { font-size: 16px; padding: 10px 14px 10px 38px; }
  .container { padding: 14px 10px; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .card-body { padding: 14px; }
  .card-name { font-size: 15px; }
  .card-desc { font-size: 12px; -webkit-line-clamp: 3; }
  .nav { gap: 4px; margin-bottom: 12px; }
  .nav-item { padding: 6px 12px; font-size: 12px; }
  .sub-nav { gap: 3px; margin-bottom: 10px; }
  .sub-nav-item { padding: 5px 10px; font-size: 11px; }
  .stats { gap: 8px; margin-bottom: 10px; }
  .stat { font-size: 12px; padding: 6px 12px; }
  .sidebar { width: 300px; right: -320px; }
  .back-top { bottom: 20px; right: 16px; width: 40px; height: 40px; font-size: 16px; }
  .header-actions { gap: 4px; }
  .icon-btn { font-size: 14px; padding: 6px 10px; }
}

/* ======== Friends Section ======== */
.friends-section {
  margin-top: 40px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}
.friends-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.friends-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.friend-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);

/* ========== RIPPLE EFFECT ========== */
document.querySelectorAll('.icon-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
    this.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  });
});

/* ========== CARD TILT ========== */
function bindCardTilt(card) {
  card.addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const cx = rect.width / 2, cy = rect.height / 2;
    const rx = (y - cy) / cy * -6, ry = (x - cx) / cx * 6;
    this.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`;
  });
  card.addEventListener('mouseleave', function() {
    this.style.transform = '';
  });
}

/* ========== FLIP ANIMATION WRAPPER ========== */
function animateRender(fn) {
  if (document.startViewTransition) {
    document.startViewTransition(() => { fn(); });
  } else {
    fn();
  }
}

/* ========== RENDER NAV ========== */
function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = cats.map(c => {
    const label = i18n['cat_'+c.key] ? i18n['cat_'+c.key][lang] : c.name;
    return `<button class="nav-item${c.key===currentCat?' active':''}${c.key==='edu'?' edu-btn':''}" data-cat="${c.key}">${label}</button>`;
  }).join('');
  nav.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      nav.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      currentSubCat = 'all';
      animateRender(() => render());
    });
  });
}

function renderSubNav() {
  const nav = document.getElementById('subNav');
  const subs = subCats[currentCat];
  if (!subs) { nav.style.display = 'none'; return; }
  nav.style.display = 'flex';
  nav.innerHTML = subs.map(s => `<button class="sub-nav-item${currentSubCat===s.key?' active':''}" data-sub="${s.key}">${s.name[lang]}</button>`).join('');
  nav.querySelectorAll('.sub-nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      nav.querySelectorAll('.sub-nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSubCat = btn.dataset.sub;
      animateRender(() => render());
    });
  });
}

    const priceTag = t.price === 'free' ? 'free' : t.price === 'paid' ? 'paid' : 'freemium';
    const vpnClass = t.tags.includes('需魔法') ? ' vpn' : '';
    return `<div class="card" data-url="${t.url}" data-id="${t.id}" style="animation-delay:${i*0.03}s">
      <div class="card-body">
        <div class="card-top">
          <div class="card-name"><span class="icon">${t.icon}</span>${t.name}</div>
          <button class="fav-btn${isFav?' active':''}" data-id="${t.id}" aria-label="${isFav?'取消收藏':'收藏'} ${t.name}">${isFav?'❤️':'🤍'}</button>
        </div>
        <div class="card-tags">
          <span class="tag ${priceTag}">${lang==='zh'?(t.price==='free'?'免费':t.price==='paid'?'付费':'免费+'):t.price.charAt(0).toUpperCase()+t.price.slice(1)}</span>
          ${t.tags.slice(0,3).map(tg => `<span class="tag${tg==='需魔法'?' vpn':''}">${tg==='需魔法'?i18n.vpnTag[lang]:tg}</span>`).join('')}
        </div>
        <div class="card-desc">${lang==='en'&&t.descEn?t.descEn:t.desc}</div>
        <div class="card-footer">
          <span class="card-rating">${stars} ${t.rating}</span>
          <span>${t.catName}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.card').forEach(card => {
    bindCardTilt(card);
    card.addEventListener('click', e => {
      if (e.target.closest('.fav-btn')) return;
      const url = card.dataset.url;
      if (url) window.open(url, '_blank');
    });
  });
  document.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const idx = favorites.indexOf(id);
      if (idx > -1) { favorites.splice(idx, 1); } else { favorites.push(id); }
      localStorage.setItem('ai_fav', JSON.stringify(favorites));
      render(); renderFav();
    });
  });
  updateFavCount();
}

function renderFav() {
  const list = document.getElementById('favList');
  if (!favorites.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">⭐</div><p>${lang==='zh'?'还没有收藏任何工具':'No favorites yet'}</p></div>`;
    return;
  }
  const items = favorites.map(id => toolsData.find(t => t.id === id)).filter(Boolean);
  list.innerHTML = items.map(t => `<div class="fav-item" onclick="window.open('${t.url}','_blank')"><h4>${t.icon} ${t.name}</h4><p>${t.desc}</p></div>`).join('');
}

function updateFavCount() { document.getElementById('favCount').textContent = favorites.length; }

/* ========== THEME ========== */
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next === 'light' ? '☀️' : '🌙';
  localStorage.setItem('ai_theme', next);
});

/* ========== LANG ========== */
function applyLang() {
  const l = lang;
  document.getElementById('siteTitle').textContent = i18n.siteTitle[l];
  document.getElementById('searchInput').placeholder = i18n.searchPlaceholder[l];
  document.getElementById('favTitle').textContent = i18n.favTitle[l];
  document.getElementById('langLabel').textContent = l === 'zh' ? 'EN' : '中';
  renderNav(); render(); renderFav(); renderSubNav();
  const banner = document.getElementById('eduBanner');
  if (banner) banner.innerHTML = i18n.eduBanner[l];
}
document.getElementById('langToggle').addEventListener('click', () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('ai_lang', lang);
  applyLang();
});

/* ========== SEARCH ========== */
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; animateRender(() => render()); });

/* ========== FAV SIDEBAR ========== */
document.getElementById('favToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('active');
  document.getElementById('overlay').classList.toggle('active');
  renderFav();
});
document.getElementById('favClose').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
});

/* ========== AD ========== */
var adList = [
  {url:'https://cp102-bot.github.io/oil-scraper/', text:'🛢️ <strong>原油数据采集器</strong> — 成品零反爬，WTI价格+新闻一键采集 ¥399'},
  {url:'https://cp102-bot.github.io/wzrysjglz/', text:'⚔️ <strong>王者荣耀世界攻略站</strong> — 英雄图鉴、出装铭文、地图探索全收录'},
  {url:'https://personality-test-site-jaxmj5zmn-cp102-s-projects.vercel.app/', text:'🧩 <strong>乱序人格研究所</strong> — 科学人格测试，发现未知的自己'},
];
var adIndex = 0;
function setAd(url, text) {
  const banner = document.getElementById('adBanner');
  const content = document.getElementById('adContent');
  if (!url || !text) {
    banner.classList.add('dormant'); banner.dataset.url = '';
    content.innerHTML = '📢 <strong>广告位</strong> — 欢迎合作';
    return;
  }
  banner.classList.remove('dormant'); banner.classList.add('active');
  banner.dataset.url = url; content.innerHTML = text;
}
function rotateAd() {
  var ad = adList[adIndex % adList.length];
  setAd(ad.url, ad.text);
  adIndex++;
}
rotateAd();
setInterval(rotateAd, 10000);

/* ========== FEEDBACK ========== */
var fbType = 'bug';
function openFeedback() {
  document.getElementById('feedbackOverlay').style.display = 'flex';
  document.getElementById('feedbackSuccess').style.display = 'none';
  document.querySelector('.feedback-body').style.display = 'block';
  document.getElementById('fbInput').value = '';
  updateFbCount();
  updateFbLang();
}
function closeFeedback(e) {
  if (e && e.target !== document.getElementById('feedbackOverlay')) return;
  document.getElementById('feedbackOverlay').style.display = 'none';
}
function updateFbCount() {
  var l = document.getElementById('fbInput').value.length;
  document.getElementById('fbCount').textContent = l + '/1000';
}
function updateFbLang() {
  var t = document.getElementById('feedbackTitle');
  if (lang === 'zh') {
    t.textContent = '💬 反馈建议';
    document.getElementById('fbBugBtn').textContent = '🐛 报错';
    document.getElementById('fbIdeaBtn').textContent = '💡 建议';
    document.getElementById('fbToolBtn').textContent = '🔧 推荐工具';
    document.getElementById('fbOtherBtn').textContent = '📝 其他';
    document.getElementById('fbInput').placeholder = '描述你的问题或建议...';
    document.getElementById('feedbackThanks').textContent = '感谢你的反馈！';
  } else {
    t.textContent = '💬 Feedback';
    document.getElementById('fbBugBtn').textContent = '🐛 Bug';
    document.getElementById('fbIdeaBtn').textContent = '💡 Suggestion';
    document.getElementById('fbToolBtn').textContent = '🔧 Recommend';
    document.getElementById('fbOtherBtn').textContent = '📝 Other';
    document.getElementById('fbInput').placeholder = 'Describe your issue or suggestion...';
    document.getElementById('feedbackThanks').textContent = 'Thanks for your feedback!';
  }
}
document.getElementById('feedbackBtn').addEventListener('click', openFeedback);
document.getElementById('feedbackClose').addEventListener('click', () => closeFeedback());
document.getElementById('feedbackOverlay').addEventListener('click', closeFeedback);
document.querySelectorAll('.fb-type-btn').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.fb-type-btn').forEach(function(x) { x.classList.remove('active'); });
    this.classList.add('active');
    fbType = this.dataset.type;
  });
});
document.getElementById('fbInput').addEventListener('input', updateFbCount);
document.getElementById('fbSubmit').addEventListener('click', function() {
  var txt = document.getElementById('fbInput').value.trim();
  if (!txt) return;
  var btn = document.getElementById('fbSubmit');
  btn.disabled = true;
  btn.textContent = lang === 'zh' ? '提交中...' : 'Submitting...';
  setTimeout(function() {
    document.querySelector('.feedback-body').style.display = 'none';
    document.getElementById('feedbackSuccess').style.display = 'block';
    btn.disabled = false;
    btn.textContent = lang === 'zh' ? '提交' : 'Submit';
    setTimeout(closeFeedback, 1800);
  }, 600);
});

/* ========== BACK TO TOP ========== */
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
});

/* ========== INIT ========== */
const savedTheme = localStorage.getItem('ai_theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeToggle').textContent = savedTheme === 'light' ? '☀️' : '🌙';
applyLang();
updateFavCount();
</script>
